<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 16 16%27%3E%3Ccircle cx=%278%27 cy=%278%27 r=%276%27 fill=%27%237c5cff%27/%3E%3C/svg%3E" />
    <meta name="color-scheme" content="dark light" />
    <title>NebulaDisplay Viewer</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="connect-screen">
      <div class="card">
        <h1><span class="logo"></span>NebulaDisplay</h1>
        <p class="sub">Turn this device into an extra screen. Local network only — no accounts, no cloud.</p>
        <div class="field">
          <label for="host">Host address</label>
          <input id="host" placeholder="192.168.1.20:41800" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field" id="pin-field">
          <label for="pin">Pairing PIN (shown on the host)</label>
          <input id="pin" placeholder="6-digit PIN" inputmode="numeric" autocomplete="one-time-code" />
        </div>
        <div class="field">
          <label for="client-name">This device's name</label>
          <input id="client-name" placeholder="My tablet" />
        </div>
        <button id="connect-btn" class="primary">Connect</button>
        <div class="status" id="status"></div>
        <div class="hint" id="paired-hint"></div>
        <div class="hint" id="compat-note" style="display: none"></div>
      </div>
    </div>

    <div id="viewer-screen">
      <canvas id="screen"></canvas>
      <img id="remote-cursor" alt="" draggable="false" />
      <div id="toolbar">
        <span class="name" id="server-name"></span>
        <select id="profile" title="Quality profile">
          <option value="office">Office</option>
          <option value="video">Video</option>
          <option value="drawing">Drawing</option>
          <option value="gaming">Gaming</option>
        </select>
        <select id="input-mode" title="Input mode">
          <option value="view_only">View only</option>
          <option value="direct_touch">Direct touch</option>
          <option value="keyboard_mouse">Keyboard + mouse</option>
          <option value="drawing_tablet">Drawing tablet</option>
        </select>
        <span id="input-denied">input not granted by host</span>
        <button id="stats-btn" title="Toggle stats overlay">Stats</button>
        <button id="fullscreen-btn" title="Fullscreen">⛶</button>
        <button id="disconnect-btn" class="danger">Disconnect</button>
      </div>
      <div id="stats-overlay"></div>
      <div id="toast"></div>
    </div>
  </body>
</html>
