[package]
name = "nebulad"
description = "NebulaDisplay host service: capture, encode, encrypt, stream, input bridge, discovery, control panel"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["h264"]
# OpenH264 software encoder (built from source; BSD-2-Clause). Disable to fall
# back to JPEG-only streaming: `cargo build --no-default-features`.
h264 = ["dep:openh264"]

[dependencies]
ndsp-protocol = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["fs", "set-header"] }
clap = { version = "4", features = ["derive"] }
toml = "0.8"
uuid = { version = "1", features = ["v4"] }
jpeg-encoder = { version = "0.6", features = ["simd"] }
qrcode = { version = "0.14", default-features = false, features = ["svg"] }
openh264 = { version = "0.9", optional = true }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62", features = [
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Graphics_Direct3D",
    "Win32_Graphics_Direct3D11",
    "Win32_Graphics_Gdi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Memory",
    "Win32_System_Threading",
    "Win32_Foundation",
] }

[dev-dependencies]
ndsp-client = { workspace = true }
