name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    name: Rust (Linux) — build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: |
          rustfmt --version
          if ! cargo fmt --all --check > /tmp/fmt.out 2>&1; then
            head -c 4000 /tmp/fmt.out | while IFS= read -r l; do echo "::warning title=fmt::$l"; done
            exit 1
          fi
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (unit + protocol + e2e over real sockets)
        run: cargo test --workspace
      - name: Build release host
        run: cargo build --release -p nebulad

  rust-windows:
    name: Rust (Windows) — cfg(windows) paths compile + tests
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings) — validates DXGI/SendInput/IDD-ring/tray code
        shell: bash
        env:
          CARGO_TERM_COLOR: never
        run: |
          if ! cargo clippy --workspace --all-targets -- -D warnings > clippy.out 2>&1; then
            tail -c 6000 clippy.out
            grep -E "^(error|warning)" clippy.out | head -8 | while IFS= read -r l; do echo "::warning title=clippy::${l}"; done
            git config user.email ci@local && git config user.name ci-debug
            git checkout -B ci-debug-win
            git add -f clippy.out && git commit -q -m "ci debug: windows clippy log"
            git push -f -q origin ci-debug-win || echo "::warning title=clippy::debug branch push failed"
            exit 1
          fi
      - name: Tests
        shell: bash
        run: |
          if ! cargo test --workspace > tests.out 2>&1; then
            { grep -E "FAILED|panicked|^failures:" -A 6 tests.out | head -c 2500; tail -c 1200 tests.out; } | while IFS= read -r l; do echo "::warning title=win-tests::$l"; done
            exit 1
          fi
          grep "test result" tests.out

  driver-syntax:
    name: IddCx driver — syntax/type check (both header models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check against stub WDK headers (IddCx 1.10 + 1.4)
        run: host/windows-driver/tests/syntax-check.sh

  web:
    name: Web viewer — typecheck, build, host compat test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/web/package-lock.json
      - name: Install
        working-directory: viewer/web
        run: npm ci
      - name: Typecheck + build
        working-directory: viewer/web
        run: npm run build
      - name: Letterbox coordinate-mapping unit tests
        working-directory: viewer/web
        run: node tests/mapping.mjs
      - name: SPAKE2 cross-stack vectors (TS vs Rust fixed vector)
        working-directory: viewer/web
        run: node tests/pake-vectors.mjs
      - name: Build host for compat test
        run: cargo build -p nebulad
      - name: Cross-stack crypto/protocol compatibility (Node WebCrypto vs Rust host)
        working-directory: viewer/web
        run: |
          if ! node tests/web-compat.mjs > compat.out 2>&1; then
            tail -c 2500 compat.out | while IFS= read -r l; do echo "::warning title=web-compat::$l"; done
            exit 1
          fi
          tail -3 compat.out
      - name: Cross-stack compatibility — pure-JS crypto fallback (insecure-context path)
        working-directory: viewer/web
        run: |
          if ! NDSP_CRYPTO=fallback node tests/web-compat.mjs > compat2.out 2>&1; then
            tail -c 2500 compat2.out | while IFS= read -r l; do echo "::warning title=web-compat-fallback::$l"; done
            exit 1
          fi
          tail -3 compat2.out

  browser-e2e:
    name: Browser E2E — Chromium pairing/H.264/input/panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps + Chromium
        working-directory: viewer/web
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Build
        run: cargo build --release -p nebulad
      - name: Build viewer
        working-directory: viewer/web
        run: npm run build
      - name: Run browser E2E
        working-directory: viewer/web
        run: node tests/browser-e2e.mjs e2e-screenshots
      - name: Run cross-environment compat E2E (insecure context / iOS-like / Android-like / WebView)
        working-directory: viewer/web
        run: node tests/compat-e2e.mjs
      - name: Run auto-reconnect E2E (host killed + restarted mid-stream)
        working-directory: viewer/web
        run: node tests/reconnect-e2e.mjs
      - name: Quick pipeline benchmark (regression visibility, non-gating numbers)
        working-directory: viewer/web
        run: node tests/bench.mjs --quick
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: viewer/web/e2e-screenshots/
          if-no-files-found: ignore
