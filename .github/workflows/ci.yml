name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    name: Rust (Linux) — build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps (ALSA for cpal, D-Bus for keyring)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (unit + protocol + e2e over real sockets)
        run: cargo test --workspace
      - name: Build release host
        run: cargo build --release -p nebulad

  rust-windows:
    name: Rust (Windows) — cfg(windows) paths compile + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings) — validates DXGI/SendInput/IDD-ring/tray code
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  rust-macos:
    name: Rust (macOS) — keychain/CoreAudio paths compile + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings) — validates keyring apple-native + cpal CoreAudio code
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  spake2-interop:
    name: SPAKE2 — Kotlin (Android) vs Rust byte-compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build the Rust reference server
        run: cargo build -p ndsp-protocol --example spake2_interop
      - name: Run the cross-stack exchange (25 rounds + negatives)
        run: gradle -p viewer/android/interop --no-daemon run --args="$PWD/target/debug/examples/spake2_interop"

  android-build:
    name: Android viewer — assembleDebug
    runs-on: ubuntu-latest
    # Advisory until proven stable on runners (the app needs the Android
    # SDK, which only exists in CI — see docs/TESTING.md).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Assemble debug APK
        working-directory: viewer/android
        run: gradle --no-daemon :app:assembleDebug

  ios-typecheck:
    name: iOS viewer — Swift type check (iphonesimulator SDK)
    runs-on: macos-latest
    # Advisory until proven stable on runners (no Xcode project yet; this
    # gates the Swift sources the way driver-syntax gates the driver).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Type-check against the simulator SDK
        working-directory: viewer/ios
        run: |
          xcrun -sdk iphonesimulator swiftc -typecheck             -target arm64-apple-ios16.0-simulator             NebulaViewer/*.swift

  driver-syntax:
    name: IddCx driver — syntax/type check (both header models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check against stub WDK headers (IddCx 1.10 + 1.4)
        run: host/windows-driver/tests/syntax-check.sh

  web:
    name: Web viewer — typecheck, build, host compat test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps (ALSA for cpal, D-Bus for keyring)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/web/package-lock.json
      - name: Install
        working-directory: viewer/web
        run: npm ci
      - name: Typecheck + build
        working-directory: viewer/web
        run: npm run build
      - name: Letterbox coordinate-mapping unit tests
        working-directory: viewer/web
        run: node tests/mapping.mjs
      - name: Build host for compat test
        run: cargo build -p nebulad
      - name: Cross-stack crypto/protocol compatibility (Node WebCrypto vs Rust host)
        working-directory: viewer/web
        run: node tests/web-compat.mjs
      - name: Cross-stack compatibility — pure-JS crypto fallback (insecure-context path)
        working-directory: viewer/web
        run: NDSP_CRYPTO=fallback node tests/web-compat.mjs

  browser-e2e:
    name: Browser E2E — Chromium pairing/H.264/input/panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System deps (ALSA for cpal, D-Bus for keyring)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps + Chromium
        working-directory: viewer/web
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Build
        run: cargo build --release -p nebulad
      - name: Build viewer
        working-directory: viewer/web
        run: npm run build
      - name: Run browser E2E
        working-directory: viewer/web
        run: node tests/browser-e2e.mjs e2e-screenshots
      - name: Run cross-environment compat E2E (insecure context / iOS-like / Android-like / WebView)
        working-directory: viewer/web
        run: node tests/compat-e2e.mjs
      - name: Run auto-reconnect E2E (host killed + restarted mid-stream)
        working-directory: viewer/web
        run: node tests/reconnect-e2e.mjs
      - name: Quick pipeline benchmark (regression visibility, non-gating numbers)
        working-directory: viewer/web
        run: node tests/bench.mjs --quick
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: viewer/web/e2e-screenshots/
          if-no-files-found: ignore
