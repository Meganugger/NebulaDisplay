name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-linux:
    name: Rust (Linux) — build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (unit + protocol + e2e over real sockets)
        run: cargo test --workspace
      - name: Build release host
        run: cargo build --release -p nebulad

  rust-windows:
    name: Rust (Windows) — cfg(windows) paths compile + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Granular feature builds first: when a native dependency (openh264,
      # libopus/cmake, ring) breaks on the runner image, the failing step
      # names the culprit instead of burying it in one huge clippy log.
      - name: Check (no default features — pure Rust incl. all cfg(windows) code)
        run: cargo check --workspace --no-default-features
      - name: Check nebulad +https (rustls/ring)
        run: cargo check -p nebulad --no-default-features --features https
      - name: Check nebulad +audio (libopus via cmake, WASAPI path)
        run: cargo check -p nebulad --no-default-features --features audio
      - name: Check nebulad +h264 (OpenH264 build)
        run: cargo check -p nebulad --no-default-features --features h264
      - name: Clippy (deny warnings) — validates DXGI/SendInput/pen/WASAPI/clipboard/IDD-ring/tray code
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  driver-syntax:
    name: IddCx driver — syntax/type check (both header models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check against stub WDK headers (IddCx 1.10 + 1.4)
        run: host/windows-driver/tests/syntax-check.sh

  web:
    name: Web viewer — typecheck, build, host compat test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/web/package-lock.json
      - name: Install
        working-directory: viewer/web
        run: npm ci
      - name: Typecheck + build
        working-directory: viewer/web
        run: npm run build
      - name: Letterbox coordinate-mapping unit tests
        working-directory: viewer/web
        run: node tests/mapping.mjs
      - name: Build host for compat test
        run: cargo build -p nebulad
      - name: Cross-stack crypto/protocol compatibility (Node WebCrypto vs Rust host)
        working-directory: viewer/web
        run: node tests/web-compat.mjs
      - name: Cross-stack compatibility — pure-JS crypto fallback (insecure-context path)
        working-directory: viewer/web
        run: NDSP_CRYPTO=fallback node tests/web-compat.mjs

  browser-e2e:
    name: Browser E2E — Chromium pairing/H.264/input/panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web deps + Chromium
        working-directory: viewer/web
        run: |
          npm ci
          npx playwright install chromium --with-deps
      - name: Build
        run: cargo build --release -p nebulad
      - name: Build viewer
        working-directory: viewer/web
        run: npm run build
      - name: Run browser E2E
        working-directory: viewer/web
        run: node tests/browser-e2e.mjs e2e-screenshots
      - name: Run cross-environment compat E2E (insecure context / iOS-like / Android-like / WebView)
        working-directory: viewer/web
        run: node tests/compat-e2e.mjs
      - name: Run auto-reconnect E2E (host killed + restarted mid-stream)
        working-directory: viewer/web
        run: node tests/reconnect-e2e.mjs
      - name: Quick pipeline benchmark (regression visibility, non-gating numbers)
        working-directory: viewer/web
        run: node tests/bench.mjs --quick
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: viewer/web/e2e-screenshots/
          if-no-files-found: ignore
